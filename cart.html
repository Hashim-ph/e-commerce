<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Store - Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper scrollable">
        <header class="header">
            <a href="index.html" class="logo">
                <div>Aura<br>store</div>
                <div class="logo-stars">⁕</div>
            </a>
            <nav class="nav">
                <a href="index.html">main</a>
                <a href="shop.html">shop</a>
                <a href="#">custom</a>
                <a href="about.html">about</a>
                <a href="contact.html">contact</a>
            </nav>
            <div class="account">
                <a href="cart.html" class="active">cart (1)</a>
                <span>id - 003.201</span>
            </div>
        </header>

        <main class="page-content">
            <h1 class="page-title">your cart</h1>
            
            <div class="cart-layout">
                <div class="cart-items">
                    <table class="cart-table">
                        <thead>
                            <tr>
                                <th>product</th>
                                <th>quantity</th>
                                <th>price</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>
                                    <div class="cart-item-display">
                                        <img src="images/tshirt_1.png" alt="Aura Essential Tee">
                                        <div>
                                            <div style="font-weight:700;">aura essential tee</div>
                                            <div style="font-size:0.8rem; color:var(--accent-color);">size: large | color: black</div>
                                        </div>
                                    </div>
                                </td>
                                <td>1</td>
                                <td>$45.00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="cart-summary">
                    <h3>summary</h3>
                    <div class="summary-row">
                        <span>subtotal</span>
                        <span>$45.00</span>
                    </div>
                    <div class="summary-row">
                        <span>shipping</span>
                        <span>calculated at checkout</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>total</span>
                        <span>$45.00</span>
                    </div>
                    <a href="checkout.html" class="btn-primary solid">proceed to checkout</a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
