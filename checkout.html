<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Store - Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper scrollable">
        <header class="header">
            <a href="index.html" class="logo">
                <div>Aura<br>store</div>
                <div class="logo-stars">⁕</div>
            </a>
            <nav class="nav">
                <a href="index.html">main</a>
                <a href="shop.html">shop</a>
                <a href="#">custom</a>
                <a href="about.html">about</a>
                <a href="contact.html">contact</a>
            </nav>
            <div class="account">
                <a href="cart.html">cart (1)</a>
                <span>id - 003.201</span>
            </div>
        </header>

        <main class="page-content">
            <h1 class="page-title">checkout</h1>
            
            <div class="checkout-layout">
                <div class="checkout-form">
                    <h2>shipping info</h2>
                    <form>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="fname">first name</label>
                                <input type="text" id="fname" placeholder="enter first name">
                            </div>
                            <div class="form-group">
                                <label for="lname">last name</label>
                                <input type="text" id="lname" placeholder="enter last name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="address">address</label>
                            <input type="text" id="address" placeholder="street address">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="city">city</label>
                                <input type="text" id="city" placeholder="city">
                            </div>
                            <div class="form-group">
                                <label for="zip">zip code</label>
                                <input type="text" id="zip" placeholder="zip code">
                            </div>
                        </div>

                        <h2 style="margin-top: 2rem;">payment</h2>
                        <div class="form-group">
                            <label for="card">card number</label>
                            <input type="text" id="card" placeholder="0000 0000 0000 0000">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="exp">expiry</label>
                                <input type="text" id="exp" placeholder="MM/YY">
                            </div>
                            <div class="form-group">
                                <label for="cvc">cvc</label>
                                <input type="text" id="cvc" placeholder="123">
                            </div>
                        </div>

                        <button type="button" class="btn-primary solid" style="width: 100%; margin-top: 2rem; padding: 1rem; font-size: 1rem;">place order ($45.00)</button>
                    </form>
                </div>

                <div class="cart-summary">
                    <h3>order summary</h3>
                    <div class="summary-row">
                        <span>1x aura essential tee</span>
                        <span>$45.00</span>
                    </div>
                    <div class="summary-row">
                        <span>shipping</span>
                        <span>free</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>total</span>
                        <span>$45.00</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
