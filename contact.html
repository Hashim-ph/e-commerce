<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Store - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper scrollable">
        <header class="header">
            <a href="index.html" class="logo">
                <div>Aura<br>store</div>
                <div class="logo-stars">⁕</div>
            </a>
            <nav class="nav">
                <a href="index.html">main</a>
                <a href="shop.html">shop</a>
                <a href="#">custom</a>
                <a href="about.html">about</a>
                <a href="contact.html" class="active">contact</a>
            </nav>
            <div class="account">
                <a href="cart.html">cart (0)</a>
                <span>id - 003.201</span>
            </div>
        </header>

        <main class="page-content text-page-layout">
            <h1 class="page-title">reach out</h1>
            
            <p>For inquiries, collaborations, or order issues, please use the form below.</p>

            <form class="checkout-form" style="margin-top: 3rem;">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">name</label>
                        <input type="text" id="name" placeholder="your name">
                    </div>
                    <div class="form-group">
                        <label for="email">email</label>
                        <input type="email" id="email" placeholder="your email">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="subject">subject</label>
                    <input type="text" id="subject" placeholder="inquiry subject">
                </div>

                <div class="form-group">
                    <label for="message">message</label>
                    <textarea id="message" rows="6" placeholder="how can we help you?"></textarea>
                </div>

                <button type="button" class="btn-primary solid" style="padding: 1rem 3rem;">send message</button>
            </form>
        </main>
    </div>
</body>
</html>
